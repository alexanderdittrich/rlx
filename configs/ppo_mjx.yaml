# PPO configuration for MuJoCo MJX Playground environments
# These environments are GPU-accelerated and support massive parallelization

# Environment settings
env_name: "Go1JoystickFlat"  # MJX Playground environment
num_envs: 2048  # Large batch size for GPU parallelization

# Training settings
total_timesteps: 50_000_000  # Total training timesteps
num_steps: 20  # Rollout length (steps per env before update)
num_minibatches: 32  # Number of minibatches for PPO update
update_epochs: 4  # Number of epochs per PPO update

# PPO hyperparameters
learning_rate: 3.0e-4  # Initial learning rate
anneal_lr: true  # Whether to anneal learning rate
lr_schedule_type: "linear"  # Options: linear, exponential, constant
decay_rate: 0.99  # Decay rate for exponential schedule
gamma: 0.99  # Discount factor
gae_lambda: 0.95  # GAE lambda parameter
clip_coef: 0.2  # PPO clipping coefficient
clip_vloss: true  # Whether to clip value loss
ent_coef: 0.01  # Entropy coefficient
vf_coef: 0.5  # Value function coefficient
max_grad_norm: 0.5  # Max gradient norm for clipping
target_kl: null  # Target KL for early stopping (null = disabled)

# Network architecture
hidden_sizes: [256, 256]  # Hidden layer sizes

# Normalization
norm_adv: true  # Normalize advantages

# Logging
log_frequency: 10  # Log every N updates
use_wandb: true  # Use Weights & Biases
wandb_project: "ppo-mjx"  # Wandb project name
seed: 42  # Random seed

# Checkpointing
save_model: true  # Whether to save checkpoints
checkpoint_dir: "checkpoints_mjx"  # Directory for checkpoints
checkpoint_frequency: 100  # Save checkpoint every N updates
keep_checkpoints: 3  # Number of recent checkpoints to keep
resume_from: null  # Path to checkpoint to resume from (null = start fresh)
