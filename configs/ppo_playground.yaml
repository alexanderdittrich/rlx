# PPO for MuJoCo Playground Configuration
defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled
 
hydra:
  run:
    dir: .
  output_subdir: null

# Environment (Brax defaults)
env_id: "CheetahRun"
num_envs: 2048  # Brax default for MJX

# Training (Brax defaults)
total_timesteps: 100000000
num_steps: 10  # Brax default: unroll_length
batch_size: 1280  # Minibatch size (rollout_buffer_size / num_minibatches = 20480 / 16)
update_epochs: 2  # Brax default: num_updates_per_batch

# PPO hyperparameters (Brax defaults)
learning_rate: 1e-4  # Brax default
anneal_lr: false
gamma: 0.9  # Brax default: discounting
gae_lambda: 0.95  # Brax default
clip_coef: 0.3  # Brax default: clipping_epsilon
clip_vloss: false  # Brax default: clipping_epsilon_value=None
ent_coef: 1e-4  # Brax default: entropy_cost
vf_coef: 0.5  # Brax default: vf_loss_coefficient
max_grad_norm: null  # Brax default: None (no clipping)
target_kl: null
reward_scaling: 1.0  # Brax default

# Network architecture (Brax defaults)
actor_hidden_sizes: [32, 32, 32, 32]  # Brax default: (32,)*4
critic_hidden_sizes: [256, 256, 256, 256, 256]  # Brax default: (256,)*5
actor_activation: "swish"  # Brax default
critic_activation: "swish"

# Normalization
norm_adv: true  # Normalize advantages (important for continuous control)

# Logging
log_frequency: 10  # Log every N iterations
use_wandb: false
wandb_project: "ppo-playground"
seed: 42

# Checkpointing
save_model: false  # Save model checkpoints
checkpoint_dir: "checkpoints"
checkpoint_frequency: 100  # Save checkpoint every N iterations
keep_checkpoints: 3  # Number of checkpoints to keep
