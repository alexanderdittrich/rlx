# PPO for MuJoCo Playground Configuration
defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled
 
hydra:
  run:
    dir: .
  output_subdir: null

# Environment
env_id: "CheetahRun"
num_envs: 8192 

# Training setting
total_timesteps: 100000000
num_steps: 20  # Match Brax: unroll_length = 20  
batch_size: 256  # Match Brax: minibatch size = 256 (NOT total batch!)
update_epochs: 4  # Match Brax: num_updates_per_batch = 4
# NOTE: Brax's batch_size is the MINIBATCH size, not total batch
# Total samples per update = batch_size * num_minibatches = 256 * 32 = 8192
# Your rollout_buffer_size = num_envs * num_steps = 8192 * 20 = 163840
# num_minibatches = rollout_buffer_size / batch_size = 163840 / 256 = 640

# PPO hyperparameters
learning_rate: 0.0003
anneal_lr: false
gamma: 0.97
gae_lambda: 0.95
clip_coef: 0.2
clip_vloss: false
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 1.0
target_kl: null
reward_scaling: 1.0

# Network architecture
actor_hidden_sizes: [512, 256, 128] 
critic_hidden_sizes: [512, 256, 128]
actor_activation: "swish"
critic_activation: "swish"

# Normalization
norm_adv: true
norm_obs: true

# WARNING: Functional discrepancies vs working Brax implementation:
# 1. Action distribution: Brax uses 'tanh_normal' (bounded), this uses 'normal' (unbounded)
# 2. Asymmetric obs: Brax uses policy_obs_key='state', value_obs_key='privileged_state'
#    This implementation doesn't support dictionary observations (critic can't see extra info)

# Logging
log_frequency: 10  # Log every N iterations
use_wandb: false
wandb_project: "ppo-playground"
seed: 42

# Checkpointing
save_model: false  # Save model checkpoints
checkpoint_dir: "checkpoints"
checkpoint_frequency: 100  # Save checkpoint every N iterations
keep_checkpoints: 3  # Number of checkpoints to keep
