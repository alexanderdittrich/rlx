# SAC — MuJoCo Playground Configuration
defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  run:
    dir: .
  output_subdir: null

# Environment
env_id: "Go1JoystickFlatTerrain"
num_envs: 128          # Brax SAC default

# Training
total_timesteps: 20_000_000
learning_starts: 8192  # fill buffer before gradient updates (Brax min_replay_size)
batch_size: 256        # Brax default

# SAC hyperparameters (Brax defaults)
actor_lr: 3.0e-4
critic_lr: 3.0e-4
alpha_lr: 3.0e-4
gamma: 0.99
tau: 0.005             # Polyak soft-update coefficient
alpha: 0.2             # initial / fixed entropy coefficient
auto_tune_alpha: true  # dual gradient descent for entropy regularisation
target_entropy_scale: 1.0  # target_entropy = -action_dim * scale
reward_scaling: 1.0

# Replay buffer
buffer_size: 1_048_576  # Brax max_replay_size

# Network architecture  (same hidden sizes for actor & critic)
hidden_sizes: [256, 256]
activation: "relu"     # Options: relu, tanh, swish, elu, gelu

# Observation keys (set both to "state" if no privileged obs)
policy_obs_key: "state"
value_obs_key: "privileged_state"

# Logging
verbose: true
progress_bar: false
log_frequency: 1000    # log every N global_steps
eval_frequency: 10000  # run evaluation every N global_steps
eval_episodes: 128

# Weights & Biases
use_wandb: false
wandb_project: "mjxrl_sac"

# Checkpointing
use_checkpointing: false
checkpoint_dir: "checkpoints"
checkpoint_frequency: 50000  # save every N global_steps (0 = off)

# Misc
use_domain_randomization: false
env_overrides: {}
seed: 42
